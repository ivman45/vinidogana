<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta dei Vini — La Dogana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--warm-white:#FFFDF9;--beige:#EDE8DF;
  --sand:#D9D0C0;--taupe:#B5A992;--brown:#7A6A52;
  --dark:#2C2416;--accent:#731717;
  --c-bianco:#C4A84A;--c-rosso:#7A2030;--c-rosato:#D4828A;
  --c-bollicine:#7CA890;--c-dolce:#C4924A;--c-naturale:#C8660A;
}
html,body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button,input,select,textarea{font-family:'DM Sans',sans-serif}
input,select,textarea{border-radius:0;-webkit-appearance:none}

/* HEADER */
.hdr{background:var(--warm-white);border-bottom:1px solid var(--sand);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo img{height:34px;width:auto}
.hdr-logo-t{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:.06em}
.hdr-logo-t em{color:var(--accent);font-style:italic}
.hdr-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:8px 18px;border:1px solid var(--sand);background:transparent;color:var(--brown);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.btn-p{background:var(--accent);color:var(--cream);border-color:var(--accent)}
.btn-p:hover{background:#5a1212;border-color:#5a1212}
.btn-g{border-color:transparent;color:var(--taupe)}
.btn-g:hover{background:var(--beige);color:var(--dark);border-color:transparent}
.btn-d{border-color:#c0392b;color:#c0392b}
.btn-d:hover{background:#c0392b;color:#fff}
.btn-sm{padding:5px 12px;font-size:9px}
.btn-ico{padding:7px 10px;font-size:15px;letter-spacing:0;border-color:transparent}
.btn-ico:hover{background:var(--beige);border-color:transparent;color:var(--dark)}

/* TOOLBAR */
.toolbar{background:var(--warm-white);border-bottom:1px solid var(--beige);padding:0 40px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.cat-btn{font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;padding:0 18px;height:44px;white-space:nowrap;border:none;background:transparent;color:var(--taupe);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px}
.cat-btn:hover{color:var(--accent)}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.t-sep{width:1px;height:18px;background:var(--beige);flex-shrink:0;margin:0 2px}
.srch{margin-left:auto;display:flex;align-items:center;border-left:1px solid var(--beige);padding-left:16px;gap:8px;flex-shrink:0}
.srch svg{color:var(--taupe);flex-shrink:0}
.srch input{border:none;background:transparent;outline:none;font-size:12px;color:var(--dark);width:150px;padding:4px 0}
.srch input::placeholder{color:var(--taupe)}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:32px 40px 60px}
.wine-grid{columns:1}
.reg-sec{margin-bottom:36px;break-inside:avoid-column;page-break-inside:avoid}
.reg-head{display:flex;align-items:baseline;gap:12px;padding-bottom:9px;border-bottom:1px solid rgba(44,36,22,.15);margin-bottom:0}
.reg-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:.03em}
.reg-count{font-size:11px;color:var(--taupe);margin-left:auto}
.cat-sub{display:flex;align-items:center;gap:8px;padding:10px 0 5px;margin-top:2px}
.cat-sub-bar{width:3px;height:13px;border-radius:2px;flex-shrink:0}
.cat-sub-lbl{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe)}

/* WINE ROWS */
.wine-row{display:grid;grid-template-columns:1fr auto;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--beige);cursor:pointer;transition:background .12s;gap:16px}
.wine-row:hover{background:rgba(139,69,19,.03);margin:0 -12px;padding:10px 12px}
.wine-row:last-child{border-bottom:none}
.wr-left{display:flex;align-items:baseline;gap:9px;min-width:0;flex-wrap:wrap}
.wr-name{font-size:12px;color:var(--brown);font-style:italic}
.wr-sep{color:var(--sand);font-size:11px;flex-shrink:0}
.wr-prod{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--dark)}
.wr-det{font-size:11px;color:var(--taupe)}
.wr-grapes{font-size:11px;color:var(--taupe);font-style:italic}
.wr-right{display:flex;align-items:center;gap:16px;flex-shrink:0;white-space:nowrap}
.wr-price-col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.wp-main{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--dark);line-height:1.1}
.wp-asporto-sub{font-size:10px;color:var(--taupe);letter-spacing:.02em}
.wp-glass{font-size:11px;color:var(--taupe)}
.wr-vintage{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--taupe);font-style:italic}

/* EMPTY */
.empty{text-align:center;padding:60px 0;color:var(--taupe)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-ttl{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--brown);margin-bottom:6px}

/* OVERLAYS */
.ovl{position:fixed;inset:0;background:rgba(44,36,22,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fIn .15s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--warm-white);width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:sUp .2s ease}
@keyframes sUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.m-sm{max-width:360px}.m-md{max-width:560px}.m-xl{max-width:820px}
.m-cls{position:absolute;top:16px;right:16px;width:28px;height:28px;background:var(--beige);border:none;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--brown);cursor:pointer;transition:all .15s;z-index:2}
.m-cls:hover{background:var(--dark);color:var(--cream)}

/* DETAIL */
.d-acc{height:3px}
.d-hdr{padding:28px 32px 20px;border-bottom:1px solid var(--beige)}
.d-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.d-region{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe)}
.d-badge{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;background:var(--beige);color:var(--brown)}
.d-name{font-size:13px;color:var(--brown);font-style:italic;margin-bottom:4px}
.d-prod{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;line-height:1.05}
.d-body{padding:22px 32px}
.d-specs{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:18px}
.d-spec label{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);display:block;margin-bottom:2px}
.d-spec span{font-size:13px}
.d-notes-t{font-family:'Cormorant Garamond',serif;font-size:17px;margin-bottom:6px}
.d-notes{font-size:13px;line-height:1.75;color:var(--brown);font-style:italic}
.d-ftr{padding:16px 32px;border-top:1px solid var(--beige);background:var(--cream);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.d-price{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1}
.d-price-s{font-size:11px;color:var(--taupe);margin-top:3px}
.d-asp-sub{font-size:13px;color:var(--taupe);margin-top:4px}

/* ADMIN */
.a-top{padding:20px 28px;border-bottom:1px solid var(--beige);display:flex;align-items:center;justify-content:space-between}
.a-top h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400}
.a-tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--beige)}
.a-tab{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:11px 18px;border:none;background:transparent;color:var(--taupe);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.a-tab:hover{color:var(--accent)}
.a-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.a-body{padding:18px 28px}
.admin-page{min-height:100vh;background:var(--cream)}
.admin-page .a-top{background:#fff;position:sticky;top:0;z-index:100}
.admin-page .a-tabs{background:#fff;position:sticky;top:65px;z-index:99}
.a-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.a-stat{background:var(--cream);border:1px solid var(--beige);padding:8px 13px}
.a-stat-v{font-family:'Cormorant Garamond',serif;font-size:22px;line-height:1}
.a-stat-l{font-size:9px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--taupe);margin-top:1px}
.a-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--beige)}
.a-row:last-child{border-bottom:none}
.a-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.a-info{flex:1;min-width:0}
.a-name{font-family:'Cormorant Garamond',serif;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-sub{font-size:10px;color:var(--taupe);margin-top:1px}
.a-price{font-family:'Cormorant Garamond',serif;font-size:16px;flex-shrink:0}
.a-acts{display:flex;gap:5px;flex-shrink:0}
.s-ok{color:#2e7d32;font-weight:600}.s-low{color:#e65100;font-weight:600}.s-out{color:#c62828;font-weight:600}
.stag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.stag.ok{background:#e8f5e9;color:#2e7d32}.stag.low{background:#fff3e0;color:#e65100}.stag.out{background:#fce4ec;color:#c62828}

/* SCORTE */
.sc-t{width:100%;border-collapse:collapse}
.sc-t th{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe);padding:7px 10px;border-bottom:1px solid var(--beige);text-align:left}
.sc-t td{padding:10px;border-bottom:1px solid var(--beige);vertical-align:middle}
.sc-t tr:last-child td{border-bottom:none}
.sc-t tr:hover td{background:var(--cream)}
.q-ctrl{display:flex;align-items:center;gap:5px}
.q-btn{width:24px;height:24px;border:1px solid var(--sand);background:var(--cream);color:var(--dark);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.q-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.q-num{font-family:'Cormorant Garamond',serif;font-size:20px;min-width:28px;text-align:center}

/* IO */
.io{padding:22px 28px}
.io h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;margin-bottom:5px}
.io p{font-size:12px;color:var(--brown);margin-bottom:12px;line-height:1.6}
.io-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.io-sep{border:none;border-top:1px solid var(--beige);margin-bottom:20px}
.drop-z{border:2px dashed var(--sand);padding:22px;text-align:center;cursor:pointer;transition:border-color .15s;background:var(--cream)}
.drop-z:hover{border-color:var(--brown)}
.drop-z p{font-size:12px;color:var(--taupe)}
.io-err{font-size:11px;color:#c0392b;margin-top:6px}

/* FORM */
.frm{padding:20px 28px}
.f-sec{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);padding-bottom:7px;border-bottom:1px solid var(--beige);margin-bottom:13px;margin-top:20px;display:block}
.f-sec:first-child{margin-top:0}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-col{display:flex;flex-direction:column;gap:4px}
.f-col.s2{grid-column:1/-1}
.f-lbl{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe)}
.f-inp,.f-sel,.f-txt{padding:8px 10px;border:1px solid var(--sand);background:var(--cream);font-size:12px;color:var(--dark);outline:none;transition:border-color .15s;width:100%}
.f-inp:focus,.f-sel:focus,.f-txt:focus{border-color:var(--brown)}
.f-txt{resize:vertical;min-height:70px}
.f-hint{font-size:10px;color:var(--taupe)}
.f-hint strong{color:var(--brown)}
.f-acts{display:flex;gap:8px;justify-content:flex-end;padding:14px 28px;border-top:1px solid var(--beige)}

/* MARKUP / TIERED CALC */
.mk-card{background:var(--cream);border:1px solid var(--beige);margin-top:2px;overflow:hidden}
.mk-tier-badge{display:inline-flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--dark);color:var(--cream)}
.mk-tier-name{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase}
.mk-tier-detail{font-size:10px;opacity:.65}
.mk-grid{display:grid;grid-template-columns:1fr 1px 1fr}
.mk-col{padding:12px 14px;display:flex;flex-direction:column;gap:3px}
.mk-divider{background:var(--beige)}
.mk-sep-h{height:1px;background:var(--beige);grid-column:1/-1}
.mk-lbl{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe)}
.mk-big{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--dark);line-height:1.1}
.mk-sub{font-size:10px;color:var(--taupe);margin-top:1px}
.mk-apply{font-size:10px;color:var(--accent);text-decoration:underline;background:none;border:none;padding:0;cursor:pointer;margin-top:3px;text-align:left}
.mk-apply:hover{color:var(--dark)}
.mk-chip{font-size:10px;font-weight:500;padding:2px 7px;background:#e8f5e9;color:#2e7d32;display:inline-block;margin-top:2px}
.mk-chip-warn{font-size:10px;font-weight:500;padding:2px 7px;background:#fff3e0;color:#e65100;display:inline-block;margin-top:2px}

/* WINE FLAG ICONS */
.wf-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.wf-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;flex-shrink:0;cursor:default;position:relative}
.wf-icon svg{width:14px;height:14px;display:block}
.wf-icon[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);font-size:9px;font-weight:600;letter-spacing:.06em;white-space:nowrap;padding:3px 7px;pointer-events:none;z-index:50}
.wf-nat {background:#e8f5e9;border:1px solid #a5d6a7}
.wf-bio {background:#e8f5e9;border:1px solid #a5d6a7}
.wf-biod{background:#f3e8fd;border:1px solid #ce93d8}
.wf-so2 {background:#fff3e0;border:1px solid #ffcc80}
/* modal larger icons */
.wf-icon-lg{width:26px;height:26px;border-radius:4px}
.wf-icon-lg svg{width:17px;height:17px}
.wf-label{font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--taupe);margin-left:2px}

/* FLAG CHECKBOXES IN FORM */
/* VISIBILITY TOGGLE */
.vis-toggle{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none}
.vis-toggle input{display:none}
.vis-switch{width:36px;height:20px;background:#ccc;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.vis-switch::after{content:"";position:absolute;left:3px;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.vis-toggle input:checked + .vis-switch{background:var(--accent)}
.vis-toggle input:checked + .vis-switch::after{transform:translateX(16px)}
.vis-label{font-size:11px;color:var(--dark);font-weight:500}
.vis-label small{display:block;font-size:10px;color:var(--taupe);font-weight:400;margin-top:1px}
.wine-row-hidden{opacity:.42}
.hidden-tag{font-size:8px;font-weight:700;letter-spacing:.08em;padding:1px 5px;background:#f5f5f5;color:var(--taupe);border:1px solid #ddd;border-radius:2px;margin-left:6px;text-transform:uppercase}

.f-flags{display:flex;gap:16px;flex-wrap:wrap;padding:10px 0}
.f-flag{display:flex;align-items:center;gap:6px;cursor:pointer}
.f-flag input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.f-flag span{font-size:11px;color:var(--dark)}


.val-kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.val-kpi{flex:1;min-width:120px;background:var(--cream);border:1px solid var(--beige);padding:14px 16px}
.val-kpi-v{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;line-height:1;color:var(--dark)}
.val-kpi-l{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe);margin-top:4px}
.val-kpi.accent .val-kpi-v{color:var(--accent)}
.val-kpi.green .val-kpi-v{color:#2e7d32}
.val-sec-lbl{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);margin-bottom:8px;display:block}
.val-t{width:100%;border-collapse:collapse}
.val-t th{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--taupe);padding:7px 10px;border-bottom:1px solid var(--beige);text-align:left;white-space:nowrap}
.val-t th.r{text-align:right}
.val-t td{padding:10px;border-bottom:1px solid var(--beige);vertical-align:middle;font-size:13px}
.val-t td.r{text-align:right;font-family:'Cormorant Garamond',serif;font-size:15px}
.val-t tr:last-child td{border-bottom:none}
.val-t tr:hover td{background:rgba(139,69,19,.03)}
.val-t tfoot td{border-top:2px solid var(--dark);border-bottom:none;font-weight:600;padding-top:12px}
.val-t tfoot td.r{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--dark)}
.val-bar-wrap{width:80px;height:5px;background:var(--beige);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:8px}
.val-bar{height:5px;border-radius:2px;background:var(--accent)}
.val-no-cost{font-size:11px;color:var(--taupe);font-style:italic;padding:24px;text-align:center}
.val-alert{background:#fff3e0;border:1px solid #ffe0b2;padding:10px 14px;font-size:12px;color:#e65100;margin-bottom:16px}

/* LOGIN */
.lgn-b{padding:36px}
.lgn-t{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:6px}
.lgn-s{font-size:12px;color:var(--taupe);margin-bottom:24px;line-height:1.5}
.lgn-e{font-size:11px;color:#c0392b;margin-top:5px}
.lgn-f{padding:16px 36px;border-top:1px solid var(--beige);display:flex;justify-content:flex-end;gap:8px}

/* NOTIF */
.notif{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--cream);padding:11px 18px;font-size:12px;z-index:9999;animation:nIn .18s ease}
@keyframes nIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TOGGLES */
.tog-list{display:flex;flex-direction:column;gap:0;border:1px solid var(--beige);margin-bottom:20px}
.tog-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 18px;border-bottom:1px solid var(--beige)}
.tog-row:last-child{border-bottom:none}
.tog-info{display:flex;flex-direction:column;gap:3px}
.tog-lbl{font-size:13px;font-weight:500;color:var(--dark)}
.tog-desc{font-size:11px;color:var(--taupe);line-height:1.4}
.tog-btn{width:44px;height:24px;border-radius:12px;background:var(--sand);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;padding:0}
.tog-btn.on{background:var(--dark)}
.tog-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;display:block}
.tog-btn.on .tog-knob{transform:translateX(20px)}
.tog-preview{border:1px solid var(--beige);background:var(--cream);padding:12px 16px}
.tog-preview-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);display:block;margin-bottom:6px}

/* FILTER DROPDOWNS */
.fbar{background:var(--warm-white);border-bottom:1px solid var(--beige);padding:0 40px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px}
.fd-wrap{position:relative}
.fd-btn{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--sand);background:transparent;color:var(--brown);cursor:pointer;transition:all .15s;white-space:nowrap;height:32px}
.fd-btn:hover{border-color:var(--brown);color:var(--dark)}
.fd-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.fd-btn svg{transition:transform .15s;flex-shrink:0}
.fd-btn.open svg{transform:rotate(180deg)}
.fd-count{display:inline-flex;align-items:center;justify-content:center;min-width:15px;height:15px;border-radius:8px;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:0 3px}
.fd-panel{position:absolute;top:calc(100% + 6px);left:0;min-width:220px;max-width:300px;background:var(--warm-white);border:1px solid var(--sand);box-shadow:0 8px 24px rgba(44,36,22,.12);z-index:400;animation:fIn .12s ease}
.fd-panel.right{left:auto;right:0}
.fd-chips{padding:12px;display:flex;flex-wrap:wrap;gap:6px;max-height:260px;overflow-y:auto}
.fd-chip{font-size:11px;font-weight:400;padding:5px 11px;border:1px solid var(--beige);background:var(--cream);color:var(--dark);cursor:pointer;transition:all .12s;white-space:nowrap}
.fd-chip:hover{border-color:var(--brown)}
.fd-chip.on{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.fd-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--beige)}
.fd-toggle-lbl{font-size:12px;color:var(--dark)}
.fd-clear{display:block;width:100%;padding:8px 12px;border:none;border-top:1px solid var(--beige);background:transparent;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);cursor:pointer;text-align:left;transition:color .12s}
.fd-clear:hover{color:var(--dark)}
.fbar-reset{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border:none;background:transparent;color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

@media print{
  .hdr,.toolbar,.btn,.ovl,.notif,.fbar{display:none!important}
  .page{padding:0!important;max-width:100%!important}
}
.print-hdr{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .hdr,.toolbar,.fbar{padding:0 16px}
  .page{padding:20px 16px 48px}
  .wine-grid{columns:1}
  .d-hdr,.d-body,.d-ftr{padding-left:20px;padding-right:20px}
  .a-top,.a-body,.frm,.f-acts,.io{padding-left:16px;padding-right:16px}
  .f-grid{grid-template-columns:1fr}
  .srch input{width:110px}
  .wr-prod,.wr-grapes{display:none}
}
@media(max-width:480px){
  .wr-det{display:none}
  .a-price{display:none}
}

<script type="text/babel">

const REGIONS = ["Piemonte","Toscana","Veneto","Lombardia","Friuli-Venezia Giulia","Trentino-Alto Adige","Sardegna","Sicilia","Abruzzo","Campania","Lazio","Puglia","Borgogna","Champagne","Alsazia","Bordeaux","Loira","Rhône","Francia","Spagna","Austria","Slovenia","Georgia"];
const TIERS = [
  {label:"fino a €10",  max:10,       molt:1.5},
  {label:"€10 – €20",  max:20,       molt:1.5},
  {label:"€20 – €50",  max:50,       molt:1.0},
  {label:"oltre €50",  max:Infinity, molt:0.5},
];
const IVA_LOCALE   = 0.10;
const IVA_ASPORTO  = 0.22;

// Formula: costo × molt + costo
const getTier       = cost => TIERS.find(t => cost <= t.max) || TIERS[TIERS.length-1];
const calcLocale    = cost => { const t=getTier(cost); return +(cost*t.molt + cost).toFixed(2); };
const calcLocaleIva = cost => +(calcLocale(cost)*(1+IVA_LOCALE)).toFixed(2);
const calcAsporto   = cost => +(calcLocale(cost)*(1-IVA_LOCALE)).toFixed(2); // sconto IVA locale → base netta → IVA asporto
const calcAsportoIva= cost => +(calcLocale(cost)*(1+IVA_ASPORTO)).toFixed(2);
const calcMarg      = (c,p)=>{const cv=parseFloat(c),pv=parseFloat(p);if(!cv||!pv||pv===0)return null;return(((pv-cv)/pv)*100).toFixed(1)};
const calcMult      = (c,p)=>{const cv=parseFloat(c),pv=parseFloat(p);if(!cv||!pv)return null;return(pv/cv).toFixed(2)};

const SAMPLE = [
  {id:1,name:"Vermentino di Sardegna",producer:"Cantina Mesa",category:"Bianco",vintage:"2022",region:"Sardegna",grapes:"Vermentino 100%",notes:"Paglierino brillante. Agrumi, fiori di campo, note minerali. Fresco, sapido, finale di mandorla.",price:28,priceByGlass:7,priceAsporto:22,costPrice:9.5,stock:12,isNaturale:false,isBiodinamico:false,isBiologico:false,so2:false},
  {id:2,name:"Barolo DOCG",producer:"Giacomo Conterno",category:"Rosso",vintage:"2018",region:"Piemonte",grapes:"Nebbiolo 100%",notes:"Rubino granato. Rosa appassita, tabacco, spezie, tartufo. Tannini eleganti, lunga persistenza.",price:95,priceByGlass:null,priceAsporto:80,costPrice:32,stock:3,isNaturale:false,isBiodinamico:true,isBiologico:false,so2:false},
  {id:3,name:"Franciacorta Satèn DOCG",producer:"Ca' del Bosco",category:"Bollicine",vintage:"NV",region:"Lombardia",grapes:"Chardonnay 85%, Pinot Bianco 15%",notes:"Perlage fine. Crosta di pane, miele, pesca bianca. Cremoso e avvolgente.",price:55,priceByGlass:14,priceAsporto:46,costPrice:18,stock:0,isNaturale:false,isBiodinamico:false,isBiologico:false,so2:false},
  {id:4,name:"Cerasuolo d'Abruzzo DOC",producer:"Emidio Pepe",category:"Rosato",vintage:"2023",region:"Abruzzo",grapes:"Montepulciano 100%",notes:"Rosa ciliegia. Piccoli frutti rossi, petali di rosa. Fresco, vivace, sapido.",price:22,priceByGlass:6,priceAsporto:17,costPrice:7.5,stock:8,isNaturale:true,isBiodinamico:false,isBiologico:true,so2:true},

    {/* SO₂ con barra rossa */}
    <text x="1" y="9" fontFamily="Arial" fontWeight="700" fontSize="7" fill="#e65100">SO</text>

const WineFlagIcons = ({w, lg})=>{
  const cls = `wf-icon${lg?" wf-icon-lg":""}`;
  return (w.isNaturale||w.isBiodinamico||w.isBiologico||w.so2) ? (
    <span className="wf-badges">

const stockInfo = qty => {
  if(qty==null||qty==="") return null;
  const n=parseInt(qty); if(isNaN(n)) return null;
  if(n===0) return {label:"Esaurito",cls:"out",s:"s-out"};
  if(n<=3)  return {label:`${n} rimaste`,cls:"low",s:"s-low"};
  return {label:`${n} btg`,cls:"ok",s:"s-ok"};
};

const saveLS   = (k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const loadLS   = k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}};
const todayStr = ()=>new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});

function LoginModal({onOk,onClose}) {
  const [pwd,setPwd]=useState(""); const [err,setErr]=useState(false);
  const go=()=>{if(pwd===CFG.ADMIN_PASSWORD)onOk();else{setErr(true);setTimeout(()=>setErr(false),2000);}};
  return(
    <div className="ovl" onClick={onClose}>
      <div className="modal m-sm" onClick={e=>e.stopPropagation()}>
        <button className="m-cls" onClick={onClose}>×</button>
        <div className="lgn-b">
          <h2 className="lgn-t">Accesso Gestione</h2>
          <p className="lgn-s">Password richiesta per il pannello riservato.</p>
          <div className="f-col">
            <label className="f-lbl">Password</label>
            <input className="f-inp" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" autoFocus/>
            {err&&<span className="lgn-e">Password errata.</span>}
          </div>
        </div>
        <div className="lgn-f">
          <button className="btn btn-g btn-sm" onClick={onClose}>Annulla</button>
          <button className="btn btn-p btn-sm" onClick={go}>Entra</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [wines,setWines]         = useState([]);
  const [loading,setLoading]     = useState(true);
  const [activeCat,setActiveCat] = useState("all");
  const [search,setSearch]       = useState("");
  const [detail,setDetail]       = useState(null);
  const [showLogin,setShowLogin] = useState(false);
  const [auth,setAuth]           = useState(false);
  const [showAdmin,setShowAdmin] = useState(false);
  const [tab,setTab]             = useState("lista");
  const [editWine,setEditWine]   = useState(null);
  const [showForm,setShowForm]   = useState(false);
  const [adminSearch,setAdminSearch] = useState("");
  const [qrUrl,setQrUrl]         = useState("");
  const [notif,setNotif]         = useState(null);
  const [importErr,setImportErr] = useState("");
  const [showGlass,setShowGlass]     = useState(true);
  const [showAsporto,setShowAsporto] = useState(true);
  const [openDrop,setOpenDrop] = useState(null); // "price"|"region"|"vintage"|"grape"|"stock"
  const [fPrice,setFPrice]   = useState([]);
  const [fVintage,setFVintage] = useState([]);
  const [fGrape,setFGrape]   = useState([]);
  const [fRegion,setFRegion] = useState([]);
  const [fStock,setFStock]   = useState(false);
  const notifT = useRef(null);
  const fileRef    = useRef(null);
  const xlsxRef    = useRef(null);

  useEffect(()=>{
    const s=loadLS(CFG.STORAGE_KEY);setWines(s||SAMPLE);if(!s)saveLS(CFG.STORAGE_KEY,SAMPLE);
    const cfg=loadLS(CFG.SETTINGS_KEY);
    if(cfg){setShowGlass(cfg.showGlass!==false);setShowAsporto(cfg.showAsporto!==false);}
    setLoading(false);
  },[]);

  const persist = useCallback(list=>{setWines(list);saveLS(CFG.STORAGE_KEY,list);},[]);
  const toast   = msg=>{setNotif(msg);clearTimeout(notifT.current);notifT.current=setTimeout(()=>setNotif(null),2600);};
  const saveSettings = (glass,asporto)=>{saveLS(CFG.SETTINGS_KEY,{showGlass:glass,showAsporto:asporto});toast("✓ Impostazioni salvate");};
  const toggleArr = (arr,setArr,val)=>setArr(prev=>prev.includes(val)?prev.filter(x=>x!==val):[...prev,val]);
  const resetFilters = ()=>{setFPrice([]);setFVintage([]);setFGrape([]);setFRegion([]);setFStock(false);};

  const allVintages = useMemo(()=>[...new Set(wines.map(w=>w.vintage).filter(Boolean))].sort((a,b)=>b.localeCompare(a,"it")),[wines]);
  const allGrapes   = useMemo(()=>[...new Set(wines.flatMap(w=>(w.grapes||"").split(/[,;\/]/).map(g=>g.replace(/\d+%/,"").trim()).filter(g=>g.length>2)))].sort((a,b)=>a.localeCompare(b,"it")),[wines]);
  const allRegions  = useMemo(()=>[...new Set(wines.map(w=>w.region).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"it")),[wines]);

  const PRICE_BANDS = [{id:"u30",label:"sotto €30"},{id:"30-60",label:"€30–60"},{id:"o60",label:"oltre €60"}];
  const priceMatch = (price,bands)=>{if(!bands.length) return true; return bands.some(b=>b==="u30"?price<30:b==="30-60"?price>=30&&price<=60:price>60);};

  const activeFilterCount = fPrice.length+fVintage.length+fGrape.length+fRegion.length+(fStock?1:0);

  const filtered = useMemo(()=>wines.filter(w=>{ 
    if(w.visible===false) return false; // nascosto dalla carta pubblica
    if(activeCat!=="all"&&w.category!==activeCat) return false;
    if(search&&!`${w.name} ${w.producer} ${w.grapes} ${w.region}`.toLowerCase().includes(search.toLowerCase())) return false;
    if(!priceMatch(w.price,fPrice)) return false;
    if(fVintage.length&&!fVintage.includes(w.vintage)) return false;
    if(fGrape.length&&!fGrape.some(g=>(w.grapes||"").toLowerCase().includes(g.toLowerCase()))) return false;
    if(fRegion.length&&!fRegion.includes(w.region)) return false;
    if(fStock&&!(w.stock>0)) return false;
    return true;
  }),[wines,activeCat,search,fPrice,fVintage,fGrape,fRegion,fStock]);

  const CAT_ORDER = ["Bianco","Bollicine","Rosato","Rosso","Naturale","Dolce"];
  const grouped = useMemo(()=>{
    const sorted=[...filtered].sort((a,b)=>{const r=(a.region||"").localeCompare(b.region||"","it");if(r!==0)return r;const ci=CAT_ORDER.indexOf(a.category)-CAT_ORDER.indexOf(b.category);if(ci!==0)return ci;return(a.name||"").localeCompare(b.name||"","it");});
    const map={},order=[];for(const w of sorted){const r=w.region||"—";if(!map[r]){map[r]=[];order.push(r);}map[r].push(w);}
    return order.map(r=>({region:r,wines:map[r]}));
  },[filtered,activeCat]);

  const updStock=(id,d)=>persist(wines.map(w=>w.id===id?{...w,stock:Math.max(0,(parseInt(w.stock)||0)+d)}:w));

  const doPrint = () => {
    const PRINT_CATS = CATS.filter(c => c.id !== "all");
    const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    // Raggruppa vini per categoria, solo visibili
    const grouped = {};
    for(const c of PRINT_CATS){
      const ws = wines
        .filter(w => w.category === c.id && w.visible !== false)
        .sort((a,b) => (a.region||"").localeCompare(b.region||"","it") || (a.name||"").localeCompare(b.name||"","it"));
      if(ws.length) grouped[c.id] = ws;
    }

    const flagSym = w => {
      let s = "";
      if(w.isNaturale)    s += '<span style="color:#2e7d32;font-size:7pt;">◉</span>';
      if(w.isBiologico)   s += '<span style="color:#2e7d32;font-size:7pt;">✿</span>';
      if(w.isBiodinamico) s += '<span style="color:#7b1fa2;font-size:7pt;">☽</span>';
      if(w.so2)           s += '<span style="color:#c62828;font-size:7pt;">⊘</span>';
      return s;
    };

    const today = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
    const PB = `<div style="page-break-after:always;break-after:page;height:0;line-height:0;font-size:0;margin:0;padding:0;border:0;"></div>`;

    // ── COVER ──
    const cover = `<div style="width:210mm;height:297mm;background:#FAF8F4;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div style="position:absolute;left:18mm;top:0;bottom:0;width:1px;background:#2C2416;"></div>
      <div style="position:absolute;top:22mm;width:100%;text-align:center;font-size:7.5pt;letter-spacing:.3em;text-transform:uppercase;color:#9C8E7A;">Lignano Sabbiadoro</div>
      <div style="font-size:52pt;font-weight:normal;letter-spacing:.1em;text-transform:uppercase;line-height:1.05;color:#2C2416;text-align:center;">Carta<br>dei Vini</div>
      <div style="margin-top:5mm;font-size:11pt;font-style:italic;color:#7A5C3A;text-align:center;letter-spacing:.1em;">La Dogana</div>
      <div style="width:35mm;height:1px;background:#2C2416;margin:7mm auto;"></div>
      <div style="position:absolute;bottom:22mm;width:100%;text-align:center;font-size:7pt;letter-spacing:.2em;color:#9C8E7A;text-transform:uppercase;">${esc(today)}</div>
    </div>`;

    // ── SEZIONI CATEGORIA ──
    let catSections = "";
    const catsPresenti = PRINT_CATS.filter(c => grouped[c.id]);

    for(const c of catsPresenti){
      const ws = grouped[c.id];
      const regions = [...new Set(ws.map(w => w.region||""))].filter(Boolean);
      const hasRegions = regions.length > 1;

      let rows = "";

        let hdrRow = -1;

                                    <td className="r">
                                      <span className={parseFloat(marg)>=40?"mk-chip":"mk-chip-warn"}>{marg}%</span>
                                    </td>
                                  </tr>

                              <td className="r">€{totAcquisto.toFixed(0)}</td>

                              <td className="r">€{totVendita.toFixed(0)}</td>

                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>

                        return <div key={c.id} style={{background:n===0?"#f5f5f5":"#FAF8F4",border:`1px solid ${n===0?"#eee":"var(--beige)"}`,borderRadius:6,padding:"10px 16px",minWidth:90,textAlign:"center"}}>
                          <div style={{fontSize:22,fontWeight:700,color:n===0?"#ccc":"var(--accent)"}}>{n}</div>

                        </div>;

                    </div>
                  </div>

                  <div style={{borderTop:"1px solid var(--beige)",paddingTop:16,marginBottom:12}}>

                        className="f-inp"
                        style={{flex:1,fontSize:13}}

                      const QRDisplay = ()=>{
                        const ref = React.useRef(null);
                        React.useEffect(()=>{
                          if(!ref.current||!window.QRCode) return;
                          ref.current.innerHTML="";
                          new window.QRCode(ref.current,{
                            text: qrUrl.trim(),
                            width: 240,
                            height: 240,
                            colorDark: "#2C2416",
                            colorLight: "#FAF8F4",
                            correctLevel: window.QRCode.CorrectLevel.H
                          });
                        },[]);
                        const download = ()=>{
                          const canvas = ref.current?.querySelector("canvas");
                          if(!canvas){toast("⚠ QR non ancora generato");return;}
                          // Crea canvas con logo testuale centrato
                          const out = document.createElement("canvas");
                          out.width=360; out.height=420;
                          const ctx=out.getContext("2d");
                          ctx.fillStyle="#FAF8F4";
                          ctx.fillRect(0,0,360,420);
                          ctx.drawImage(canvas,60,20,240,240);
                          ctx.fillStyle="#2C2416";
                          ctx.font="600 13px 'Georgia',serif";
                          ctx.textAlign="center";
                          ctx.fillText("La Dogana",180,290);
                          ctx.font="11px 'Georgia',serif";
                          ctx.fillStyle="#9C8E7A";
                          ctx.fillText("Carta dei Vini",180,308);
                          ctx.font="600 10px sans-serif";
                          ctx.letterSpacing="2px";
                          ctx.fillStyle="#9C8E7A";
                          ctx.fillText("LIGNANO SABBIADORO",180,330);
                          // Bordino decorativo
                          ctx.strokeStyle="#2C2416";
                          ctx.lineWidth=1;
                          ctx.strokeRect(16,16,328,388);
                          const a=document.createElement("a");
                          a.download="qrcode-ladogana-carta-vini.png";
                          a.href=out.toDataURL("image/png");
                          a.click();
                          toast("✓ QR code scaricato");
                        };

                        </div>;
                      };
                      return <QRDisplay/>;
                    })()}

                  <h3>Visualizzazione prezzi</h3>
                  <p>Scegli quali prezzi mostrare ai clienti nella carta. Le modifiche sono immediate e persistenti.</p>
                  <div className="tog-list">
                    <div className="tog-row">
                      <div className="tog-info">
                        <span className="tog-lbl">Prezzo al calice</span>
                        <span className="tog-desc">Mostra il prezzo "al calice €X" su ogni vino che lo prevede</span>
                      </div>
                      <button className={`tog-btn${showGlass?" on":""}`} onClick={()=>{const v=!showGlass;setShowGlass(v);saveSettings(v,showAsporto);}}>
                        <span className="tog-knob"/>
                      </button>
                    </div>
                    <div className="tog-row">
                      <div className="tog-info">
                        <span className="tog-lbl">Prezzo asporto</span>
                        <span className="tog-desc">Mostra il prezzo "asporto €X" su ogni vino che lo prevede</span>
                      </div>
                      <button className={`tog-btn${showAsporto?" on":""}`} onClick={()=>{const v=!showAsporto;setShowAsporto(v);saveSettings(showGlass,v);}}>
                        <span className="tog-knob"/>
                      </button>
                    </div>
                  </div>
                  <div className="tog-preview">
                    <span className="tog-preview-lbl">Anteprima</span>
                    <div className="wine-row" style={{pointerEvents:"none",borderBottom:"none"}}>
                      <div className="wr-left">
                        <span className="wr-name">Vermentino di Sardegna</span>
                        <span className="wr-sep">·</span>
                        <span className="wr-prod">Cantina Mesa</span>
                      </div>
                      <div className="wr-right">
                        {showGlass&&<span className="wp-glass">calice €7</span>}
                        <div className="wr-price-col">
                          <span className="wp-main">€28</span>
                          {showAsporto&&<span className="wp-asporto-sub">asporto €22</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </>):(
              <>
                <div className="a-top"><h2>{editWine?"Modifica vino":"Nuovo vino"}</h2></div>
                <div className="frm">
                  <span className="f-sec">Scheda</span>
                  <div className="f-grid">
                    <div className="f-col s2"><label className="f-lbl">Nome *</label><input className="f-inp" value={form.name} onChange={e=>sf("name",e.target.value)} placeholder="es. Barolo DOCG"/></div>
                    <div className="f-col"><label className="f-lbl">Produttore</label><input className="f-inp" value={form.producer} onChange={e=>sf("producer",e.target.value)} placeholder="es. Giacomo Conterno"/></div>
                    <div className="f-col"><label className="f-lbl">Categoria</label><select className="f-sel" value={form.category} onChange={e=>sf("category",e.target.value)}>{CATS.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></div>
                    <div className="f-col"><label className="f-lbl">Regione</label><input className="f-inp" list="rlist" value={form.region} onChange={e=>sf("region",e.target.value)} placeholder="es. Piemonte"/><datalist id="rlist">{REGIONS.map(r=><option key={r} value={r}/>)}</datalist></div>
                    <div className="f-col"><label className="f-lbl">Annata</label><input className="f-inp" value={form.vintage} onChange={e=>sf("vintage",e.target.value)} placeholder="es. 2022 / NV"/></div>
                    <div className="f-col s2"><label className="f-lbl">Uve</label><input className="f-inp" value={form.grapes} onChange={e=>sf("grapes",e.target.value)} placeholder="es. Nebbiolo 100%"/></div>
                    <div className="f-col s2"><label className="f-lbl">Note di degustazione</label><textarea className="f-txt" value={form.notes} onChange={e=>sf("notes",e.target.value)} placeholder="Colore, profumi, gusto, persistenza…"/></div>
                  </div>

                  <span className="f-sec">Prezzi & Ricarico</span>
                  <div className="f-grid">
                    <div className="f-col s2">
                      <label className="f-lbl">Prezzo d'acquisto (€)</label>
                      <input className="f-inp" type="number" min="0" step="0.01" value={form.costPrice} onChange={e=>sf("costPrice",e.target.value)} placeholder="es. 12.50"/>
                    </div>

                    {tier&&(
                      <div className="f-col s2">
                        <div className="mk-card">
                          <div className="mk-tier-badge">
                            <span className="mk-tier-name">Fascia {tier.label}</span>
                            <span className="mk-tier-detail">€{cnum.toFixed(2)} × {tier.molt} + €{cnum.toFixed(2)} = €{sugLocale}</span>
                          </div>
                          <div className="mk-grid">
                            <div className="mk-col">
                              <span className="mk-lbl">Prezzo locale (netto)</span>
                              <span className="mk-big">€{sugLocale}</span>
                              <span className="mk-sub">con IVA 10% → <strong>€{sugLocaleIva}</strong></span>
                              <button className="mk-apply" onClick={()=>sf("price",String(sugLocale))}>→ Applica come prezzo bottiglia</button>
                            </div>
                            <div className="mk-divider"/>
                            <div className="mk-col">
                              <span className="mk-lbl">Prezzo asporto (netto)</span>
                              <span className="mk-big">€{sugAsporto}</span>
                              <span className="mk-sub">con IVA 22% → <strong>€{sugAsportoIva}</strong></span>
                              <button className="mk-apply" onClick={()=>sf("priceAsporto",String(sugAsporto))}>→ Applica come prezzo asporto</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="f-col">
                      <label className="f-lbl">Prezzo bottiglia (€) *</label>
                      <input className="f-inp" type="number" min="0" step="0.5" value={form.price} onChange={e=>sf("price",e.target.value)} placeholder="es. 38"/>
                      {form.costPrice&&form.price&&<span className="f-hint">Margine: <strong>{marg}%</strong> · ×<strong>{mult}</strong></span>}
                    </div>
                    <div className="f-col">
                      <label className="f-lbl">Al calice (€)</label>
                      <input className="f-inp" type="number" min="0" step="0.5" value={form.priceByGlass} onChange={e=>sf("priceByGlass",e.target.value)} placeholder="vuoto = non disp."/>
                    </div>
                    <div className="f-col">
                      <label className="f-lbl">Asporto (€)</label>
                      <input className="f-inp" type="number" min="0" step="0.5" value={form.priceAsporto} onChange={e=>sf("priceAsporto",e.target.value)} placeholder="es. 32"/>
                    </div>
                  </div>

                  <span className="f-sec">Scorte</span>
                  <div className="f-grid">
                    <div className="f-col"><label className="f-lbl">Bottiglie disponibili</label><input className="f-inp" type="number" min="0" step="1" value={form.stock} onChange={e=>sf("stock",e.target.value)} placeholder="es. 12"/><span className="f-hint">Lascia vuoto per non tracciare · <strong>visibile solo admin</strong></span></div>
                    {form.stock!==""&&(()=>{const st=stockInfo(form.stock);return st?(<div className="f-col" style={{justifyContent:"flex-end"}}><label className="f-lbl">Stato</label><span className={`stag ${st.cls}`} style={{alignSelf:"flex-start"}}>● {st.label}</span></div>):null;})()}
                  </div>

                  <span className="f-sec">Certificazioni & SO₂</span>
                  <div className="f-flags">
                    <label className="f-flag"><input type="checkbox" checked={!!form.isNaturale} onChange={e=>sf("isNaturale",e.target.checked)}/><span>🌿 Naturale</span></label>
                    <label className="f-flag"><input type="checkbox" checked={!!form.isBiodinamico} onChange={e=>sf("isBiodinamico",e.target.checked)}/><span>🌙 Biodinamico</span></label>
                    <label className="f-flag"><input type="checkbox" checked={!!form.isBiologico} onChange={e=>sf("isBiologico",e.target.checked)}/><span>🌱 Biologico</span></label>
                    <label className="f-flag"><input type="checkbox" checked={!!form.so2} onChange={e=>sf("so2",e.target.checked)}/><span>◎ Senza solfiti aggiunti</span></label>
                  </div>
                </div>
                <div className="f-acts">
                  <button className="btn btn-g btn-sm" onClick={()=>setShowForm(false)}>Annulla</button>
                  <button className="btn btn-p btn-sm" onClick={saveForm}>{editWine?"Salva modifiche":"Aggiungi alla carta"}</button>
                </div>
              </>
            )}
      {notif&&<div className="notif">{notif}</div>}
    </div>
  );

  return (
    <div>
      {/* HEADER */}
      <header className="hdr">
        <div className="hdr-logo">
          {CFG.LOGO_URL
            ? <img src={CFG.LOGO_URL} alt="La Dogana" onError={e=>e.target.style.display="none"}/>
            : <span className="hdr-logo-t">La <em>Dogana</em></span>
          }
        </div>
        <div className="hdr-right">
          <button className="btn btn-ico" title="Stampa" onClick={doPrint}>🖨</button>
          <button className="btn btn-ico" title="Gestione" onClick={()=>{if(auth){setShowAdmin(true);setShowForm(false);setTab("lista");}else setShowLogin(true);}}>⚙</button>
        </div>
      </header>

      {/* TOOLBAR */}
      <div className="toolbar">
        {CATS.map((c,i)=>(
          <React.Fragment key={c.id}>
            {i>0&&<div className="t-sep"/>}
            <button className={`cat-btn${activeCat===c.id?" active":""}`} onClick={()=>setActiveCat(c.id)}>
              {c.color&&<span className="cat-dot" style={{background:c.color}}/>}
              {c.label}
            </button>
          </React.Fragment>
        ))}
        <div className="srch">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder="Cerca vino, produttore…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {/* FILTER BAR */}
      {openDrop&&<div style={{position:"fixed",inset:0,zIndex:399}} onClick={()=>setOpenDrop(null)}/>}
      <div className="fbar">
        {[
          {id:"price",  label:"Prezzo",   count:fPrice.length},
          {id:"region", label:"Regione",  count:fRegion.length},
          {id:"vintage",label:"Annata",   count:fVintage.length},
          {id:"grape",  label:"Vitigno",  count:fGrape.length},
          {id:"stock",  label:"Disponibilità", count:fStock?1:0},
        ].map(({id,label,count})=>(
          <div key={id} className="fd-wrap">
            <button
              className={`fd-btn${count>0?" active":""} ${openDrop===id?"open":""}`}
              onClick={e=>{e.stopPropagation();setOpenDrop(p=>p===id?null:id);}}
            >
              {label}
              {count>0&&<span className="fd-count">{count}</span>}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            {openDrop===id&&(
              <div className={`fd-panel${id==="grape"||id==="stock"?" right":""}`} onClick={e=>e.stopPropagation()}>
                {id==="price"&&(<>
                  <div className="fd-chips">
                    {PRICE_BANDS.map(b=><button key={b.id} className={`fd-chip${fPrice.includes(b.id)?" on":""}`} onClick={()=>toggleArr(fPrice,setFPrice,b.id)}>{b.label}</button>)}
                  </div>
                  {fPrice.length>0&&<button className="fd-clear" onClick={()=>setFPrice([])}>Azzera</button>}
                </>)}
                {id==="region"&&(<>
                  <div className="fd-chips">
                    {allRegions.map(r=><button key={r} className={`fd-chip${fRegion.includes(r)?" on":""}`} onClick={()=>toggleArr(fRegion,setFRegion,r)}>{r}</button>)}
                  </div>
                  {fRegion.length>0&&<button className="fd-clear" onClick={()=>setFRegion([])}>Azzera</button>}
                </>)}
                {id==="vintage"&&(<>
                  <div className="fd-chips">
                    {allVintages.map(v=><button key={v} className={`fd-chip${fVintage.includes(v)?" on":""}`} onClick={()=>toggleArr(fVintage,setFVintage,v)}>{v}</button>)}
                  </div>
                  {fVintage.length>0&&<button className="fd-clear" onClick={()=>setFVintage([])}>Azzera</button>}
                </>)}
                {id==="grape"&&(<>
                  <div className="fd-chips">
                    {allGrapes.map(g=><button key={g} className={`fd-chip${fGrape.includes(g)?" on":""}`} onClick={()=>toggleArr(fGrape,setFGrape,g)}>{g}</button>)}
                  </div>
                  {fGrape.length>0&&<button className="fd-clear" onClick={()=>setFGrape([])}>Azzera</button>}
                </>)}
                {id==="stock"&&(
                  <div className="fd-toggle-row">
                    <span className="fd-toggle-lbl">Solo disponibili</span>
                    <button className={`tog-btn${fStock?" on":""}`} onClick={()=>setFStock(v=>!v)}><span className="tog-knob"/></button>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
        {activeFilterCount>0&&(
          <button className="fbar-reset" onClick={resetFilters}>× Azzera tutti</button>
        )}
        <span style={{marginLeft:"auto",fontSize:11,color:"var(--taupe)",paddingRight:4}}>
          {filtered.length} {filtered.length===1?"etichetta":"etichette"}
        </span>
      </div>

      {/* PAGE */}
      <div className="page">
        <div className="print-hdr">
          <span className="print-hdr-t">Carta dei Vini — La Dogana</span>
          <span className="print-hdr-d">{todayStr()}</span>
        </div>

        {filtered.length===0 ? (
          <div className="empty">
            <div className="empty-ico">🍷</div>
            <p className="empty-ttl">Nessun risultato</p>
            <p style={{fontSize:13}}>Prova a modificare la ricerca</p>
          </div>
        ) : (
          <div className="wine-grid">
            {grouped.map(({region,wines:gw})=>(
              <div key={region} className="reg-sec">
                <div className="reg-head">
                  <h2 className="reg-title">{region}</h2>
                  <span className="reg-count">{gw.length} {gw.length===1?"etichetta":"etichette"}</span>
                </div>
                {(()=>{
                  const rows=[];let lastCat=null;
                  for(const w of gw){
                    if(activeCat==="all"&&w.category!==lastCat){lastCat=w.category;const cat=CATS.find(c=>c.id===w.category);rows.push(<div key={"sub-"+region+w.category} className="cat-sub"><div className="cat-sub-bar" style={{background:catColor(w.category)}}/><span className="cat-sub-lbl">{cat?cat.label:w.category}</span></div>);}
                    rows.push(<div key={w.id} className="wine-row" onClick={()=>setDetail(w)}><div className="wr-left">{w.producer&&<span className="wr-prod">{w.producer}</span>}{w.producer&&<span className="wr-sep">·</span>}<span className="wr-name">{w.name}</span>{w.grapes&&<><span className="wr-sep">·</span><span className="wr-grapes">{w.grapes}</span></>}<WineFlagIcons w={w}/></div><div className="wr-right">{w.vintage&&<span className="wr-vin">{w.vintage}</span>}{showGlass&&w.priceByGlass&&<span className="wp-glass">calice €{w.priceByGlass}</span>}<div className="wr-price-col"><span className="wp-main">€{w.price}</span>{showAsporto&&w.priceAsporto&&<span className="wp-asporto-sub">asporto €{w.priceAsporto}</span>}</div></div></div>);
                  }
                  return rows;
                })()}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* DETAIL */}
      {detail&&(
        <div className="ovl" onClick={()=>setDetail(null)}>
          <div className="modal m-md" onClick={e=>e.stopPropagation()}>
            <button className="m-cls" onClick={()=>setDetail(null)}>×</button>
            <div className="d-acc" style={{background:catColor(detail.category)}}/>
            <div className="d-hdr">
              <div className="d-meta"><span className="d-region">{detail.region}</span><span className="d-badge">{detail.category}</span></div>
              <p className="d-prod">{detail.producer}</p>
              <h2 className="d-name">{detail.name}</h2>
              {(detail.isNaturale||detail.isBiodinamico||detail.isBiologico||detail.so2)&&(
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  <WineFlagIcons w={detail} lg={true}/>
                  <span style={{fontSize:9,color:"var(--taupe)",letterSpacing:".06em"}}>
                    {[detail.isNaturale&&"Naturale",detail.isBiologico&&"Biologico",detail.isBiodinamico&&"Biodinamico",detail.so2&&"Senza solfiti aggiunti"].filter(Boolean).join(" · ")}
                  </span>
                </div>
              )}
            </div>
            <div className="d-body">
              <div className="d-specs">
                {detail.vintage&&<div className="d-spec"><label>Annata</label><span>{detail.vintage}</span></div>}
                {detail.region&&<div className="d-spec"><label>Regione</label><span>{detail.region}</span></div>}
                {detail.grapes&&<div className="d-spec"><label>Uve</label><span>{detail.grapes}</span></div>}
              </div>
              {detail.notes&&<><p className="d-notes-t">Note di degustazione</p><p className="d-notes">{detail.notes}</p></>}
            </div>
            <div className="d-ftr">
              <div>
                <div className="d-price">€{detail.price}</div>
                {showGlass&&detail.priceByGlass&&<div className="d-price-s">al calice €{detail.priceByGlass}</div>}
                {showAsporto&&detail.priceAsporto&&<div className="d-asp-sub">asporto €{detail.priceAsporto}</div>}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* LOGIN */}
      {showLogin&&<LoginModal onOk={()=>{setAuth(true);setShowLogin(false);setShowAdmin(true);setShowForm(false);setTab("lista");}} onClose={()=>setShowLogin(false)}/>}

      {notif&&<div className="notif">{notif}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
