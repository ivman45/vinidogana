<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta dei Vini — La Dogana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FFFFFF;--warm-white:#FFFFFF;--beige:#F5F3F0;
  --sand:#E8E4DF;--taupe:#999085;--brown:#7A6A5E;
  --dark:#3D3530;--accent:#8B1F1F;
  --c-bianco:#B8972A;--c-rosso:#8B1F1F;--c-rosato:#C4697A;
  --c-bollicine:#4A8A72;--c-dolce:#B87820;
}
html,body{background:var(--cream);font-family:'Sohne',sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;text-align:left}
#root{min-height:100vh}
button,input,select,textarea{font-family:'Sohne',sans-serif}
input,select,textarea{border-radius:0;-webkit-appearance:none}

/* HEADER */
.hdr{background:var(--accent);border-bottom:none;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo img{height:30px;width:auto;filter:brightness(0) invert(1)}
.hdr-logo-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:.08em;color:#fff}
.hdr-logo-t em{color:var(--accent);font-style:italic}
.hdr-right{display:flex;gap:4px;align-items:center}

/* BUTTONS */
.btn{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:8px 18px;border:1px solid var(--sand);background:transparent;color:var(--brown);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#5a1111;border-color:#5a1111}
.btn-g{border-color:transparent;color:var(--taupe)}
.btn-g:hover{background:var(--beige);color:var(--dark);border-color:transparent}
.btn-d{border-color:#c0392b;color:#c0392b}
.btn-d:hover{background:#c0392b;color:#fff}
.btn-sm{padding:5px 12px;font-size:9px}
.btn-ico{padding:7px 10px;font-size:15px;letter-spacing:0;border-color:transparent;color:rgba(255,255,255,.6)}
.btn-ico:hover{background:rgba(255,255,255,.1);border-color:transparent;color:#fff}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--sand);padding:0 40px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none}
.filterbar{background:#FAFAF8;border-bottom:1px solid var(--beige);padding:8px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.f-drop{font-family:'Sohne',sans-serif;font-size:11px;border:1px solid var(--sand);background:#fff;color:var(--dark);padding:5px 10px;outline:none;cursor:pointer;transition:border-color .12s}
.f-drop:focus{border-color:var(--accent)}
.f-drop.on{border-color:var(--accent);color:var(--accent);background:#fff5f5}
.f-reset{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 6px;text-decoration:underline}
.f-count{font-size:11px;color:var(--taupe);margin-left:auto}
.toolbar::-webkit-scrollbar{display:none}
.cat-btn{font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;padding:0 16px;height:44px;white-space:nowrap;border:none;background:transparent;color:var(--taupe);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.cat-btn:hover{color:var(--dark)}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.cat-btn-mescita{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;padding:0 18px;height:44px;white-space:nowrap;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.cat-btn-mescita:hover{background:#6a1515}
.cat-btn-mescita.active{background:#6a1515;outline:2px solid var(--accent);outline-offset:2px}
.mescita-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:24px 40px}
.mescita-card{border:1px solid var(--sand);padding:16px 18px;cursor:pointer;transition:border-color .12s}
.mescita-card:hover{border-color:var(--accent)}
.mescita-prod{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--dark)}
.mescita-name{font-size:12px;color:var(--taupe);margin-top:2px}
.mescita-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--accent);margin-top:10px}
.mescita-sub{font-size:11px;color:var(--taupe);margin-top:2px}
.mescita-empty{padding:48px 40px;color:var(--taupe);font-size:14px}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-sep{width:1px;height:16px;background:var(--beige);flex-shrink:0;margin:0 2px}
.srch{margin-left:auto;display:flex;align-items:center;border-left:1px solid var(--beige);padding-left:16px;gap:8px;flex-shrink:0}
.srch svg{color:var(--taupe);flex-shrink:0}
.srch input{border:none;background:transparent;outline:none;font-size:12px;color:var(--dark);width:150px;padding:4px 0}
.srch input::placeholder{color:var(--taupe)}

/* PAGE */
.page{padding:36px 40px 80px}

/* SECTIONS */
.reg-sec{margin-bottom:48px}
.reg-head{display:flex;align-items:center;gap:12px;padding-bottom:10px;margin-bottom:0;border-bottom:1px solid var(--sand)}
.reg-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dark)}
.reg-count{font-size:10px;color:var(--taupe);margin-left:auto;letter-spacing:.05em}
.cat-sub{display:flex;align-items:center;gap:8px;padding:12px 0 4px;margin-top:2px}
.cat-sub-bar{width:2px;height:11px;border-radius:1px;flex-shrink:0}
.cat-sub-lbl{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe)}

/* WINE ROWS */
.wine-row{display:grid;grid-template-columns:1fr auto;align-items:baseline;padding:11px 0;border-bottom:1px solid var(--beige);cursor:pointer;transition:all .12s;gap:16px}
.wine-row:hover{background:rgba(115,23,23,.03);margin:0 -14px;padding:11px 14px;border-bottom-color:transparent}
.wine-row:last-child{border-bottom:none}
.wr-left{display:flex;align-items:baseline;gap:8px;min-width:0;flex-wrap:wrap}
.wr-prod{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--dark);letter-spacing:.01em}
.wr-sep{color:#C0B8B0;font-size:10px;flex-shrink:0}
.wr-name{font-size:14px;color:#5A4E45;letter-spacing:.02em;font-weight:500}
.wr-grapes{font-size:13px;color:#7A6A5E;font-style:italic}
.wr-right{display:flex;align-items:baseline;gap:10px;flex-shrink:0;white-space:nowrap}
.wp-main{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--dark)}
.wp-glass{font-size:11px;color:var(--taupe)}
.wp-asp{font-size:10px;color:var(--taupe);letter-spacing:.02em}
.wr-vin{font-family:'Sohne',sans-serif;font-size:13px;color:var(--taupe);font-weight:400;letter-spacing:.03em}

/* EMPTY */
.empty{text-align:left;padding:80px 0;color:var(--taupe)}
.empty-ico{font-size:36px;margin-bottom:14px;opacity:.3}
.empty-ttl{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--brown);margin-bottom:6px}

/* OVERLAYS */
.ovl{position:fixed;inset:0;background:rgba(44,36,32,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:fIn .15s ease}
.ovl-admin{position:fixed;inset:0;background:#FAFAF8;z-index:500;overflow-y:auto;animation:fIn .15s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:sUp .2s ease;border-top:3px solid var(--accent)}
@keyframes sUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.m-sm{max-width:360px}.m-md{max-width:540px}.m-xl{max-width:820px}
.m-cls{position:absolute;top:16px;right:16px;width:28px;height:28px;background:var(--beige);border:none;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--brown);cursor:pointer;transition:all .15s;z-index:2}
.m-cls:hover{background:var(--accent);color:#fff}

/* DETAIL */
.d-acc{height:3px}
.d-hdr{padding:28px 32px 20px;border-bottom:1px solid var(--beige)}
.d-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.d-region{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--taupe)}
.d-badge{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;background:var(--accent);color:#fff}
.d-name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1.05;margin-bottom:4px}
.d-prod{font-size:12px;color:var(--taupe);letter-spacing:.05em;text-transform:uppercase}
.d-body{padding:22px 32px}
.d-specs{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:18px}
.d-spec label{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);display:block;margin-bottom:3px}
.d-spec span{font-size:13px}
.d-notes-t{font-family:'Cormorant Garamond',serif;font-size:17px;margin-bottom:6px}
.d-notes{font-size:13px;line-height:1.8;color:var(--brown);font-style:italic}
.d-ftr{padding:16px 32px;border-top:1px solid var(--beige);background:var(--cream);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.d-price{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1;color:var(--accent)}
.d-price-s{font-size:11px;color:var(--taupe);margin-top:3px}
.d-asp-l{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe);margin-bottom:2px}
.d-asp-p{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--brown)}

/* ADMIN */
.a-top{padding:18px 28px;border-bottom:1px solid var(--beige);display:flex;align-items:center;justify-content:space-between}
.a-top h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.a-tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--beige)}
.a-tab{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:11px 16px;border:none;background:transparent;color:var(--taupe);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.a-tab:hover{color:var(--dark)}
.a-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.a-body{padding:18px 28px}
.a-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.a-stat{background:#fff;border:1px solid var(--beige);padding:10px 16px;border-left:3px solid var(--accent)}
.a-stat-v{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1;color:var(--accent)}
.a-stat-l{font-size:9px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--taupe);margin-top:2px}
.a-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--beige)}
.a-row:last-child{border-bottom:none}
.a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.a-info{flex:1;min-width:0}
.a-name{font-family:'Cormorant Garamond',serif;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-sub{font-size:10px;color:var(--taupe);margin-top:1px}
.a-price{font-family:'Cormorant Garamond',serif;font-size:16px;flex-shrink:0}
.a-acts{display:flex;gap:5px;flex-shrink:0}
.btn-tog{padding:3px 8px;font-size:10px;border:1px solid var(--sand);background:#fff;color:var(--taupe);cursor:pointer;transition:all .12s;letter-spacing:.04em}
.btn-tog.on{border-color:var(--accent);background:#fff5f5;color:var(--accent);font-weight:600}
.btn-tog.off{border-color:var(--sand);background:var(--beige);color:var(--taupe);text-decoration:line-through}
.s-ok{color:#2e7d32;font-weight:600}.s-low{color:#e65100;font-weight:600}.s-out{color:#c62828;font-weight:600}
.stag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.stag.ok{background:#e8f5e9;color:#2e7d32}.stag.low{background:#fff3e0;color:#e65100}.stag.out{background:#fce4ec;color:#c62828}

/* SCORTE */
.sc-t{width:100%;border-collapse:collapse}
.sc-t th{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe);padding:7px 10px;border-bottom:2px solid var(--beige);text-align:left}
.sc-t td{padding:10px;border-bottom:1px solid var(--beige);vertical-align:middle}
.sc-t tr:last-child td{border-bottom:none}
.sc-t tr:hover td{background:#fff}
.q-ctrl{display:flex;align-items:center;gap:5px}
.q-btn{width:24px;height:24px;border:1px solid var(--sand);background:var(--cream);color:var(--dark);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.q-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-num{font-family:'Cormorant Garamond',serif;font-size:20px;min-width:28px;text-align:center}

/* IO */
.io{padding:22px 28px}
.io h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;margin-bottom:5px}
.io p{font-size:12px;color:var(--brown);margin-bottom:12px;line-height:1.6}
.io-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.io-sep{border:none;border-top:1px solid var(--beige);margin-bottom:20px}
.drop-z{border:2px dashed var(--sand);padding:22px;text-align:left;cursor:pointer;transition:border-color .15s;background:#fff}
.drop-z:hover{border-color:var(--accent)}
.drop-z p{font-size:12px;color:var(--taupe)}
.io-err{font-size:11px;color:#c0392b;margin-top:6px}

/* FORM */
.frm{padding:20px 28px}
.f-sec{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);padding-bottom:7px;border-bottom:1px solid var(--beige);margin-bottom:13px;margin-top:22px;display:block}
.f-sec:first-child{margin-top:0}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-col{display:flex;flex-direction:column;gap:4px}
.f-col.s2{grid-column:1/-1}
.f-lbl{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--taupe)}
.f-inp,.f-sel,.f-txt{padding:8px 10px;border:1px solid var(--sand);background:#fff;font-size:12px;color:var(--dark);outline:none;transition:border-color .15s;width:100%}
.f-inp:focus,.f-sel:focus,.f-txt:focus{border-color:var(--accent)}
.f-txt{resize:vertical;min-height:70px}
.f-hint{font-size:10px;color:var(--taupe)}
.f-hint strong{color:var(--brown)}
.f-acts{display:flex;gap:8px;justify-content:flex-end;padding:14px 28px;border-top:1px solid var(--beige);background:var(--cream)}

/* MARKUP */
.mk-pre-row{display:flex;gap:5px;margin-top:5px}
.mk-pre{padding:3px 9px;font-size:10px;border:1px solid var(--sand);background:#fff;color:var(--brown);cursor:pointer;transition:all .12s}
.mk-pre:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.mk-card{background:var(--cream);border:1px solid var(--beige);border-left:3px solid var(--accent);padding:12px 16px;margin-top:2px}
.mk-row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.mk-it{display:flex;flex-direction:column;gap:2px}
.mk-lbl{font-size:9px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--taupe)}
.mk-big{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--accent);line-height:1}
.mk-val{font-family:'Cormorant Garamond',serif;font-size:16px}
.mk-chip{font-size:10px;font-weight:500;padding:2px 7px;background:#e8f5e9;color:#2e7d32}
.mk-apply{font-size:10px;color:var(--accent);text-decoration:underline;background:none;border:none;padding:0;cursor:pointer;margin-top:2px}
.mk-sep{width:1px;background:var(--beige);align-self:stretch;flex-shrink:0}

/* LOGIN */
.lgn-b{padding:36px}
.lgn-t{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:6px}
.lgn-s{font-size:12px;color:var(--taupe);margin-bottom:24px;line-height:1.5}
.lgn-e{font-size:11px;color:#c0392b;margin-top:5px}
.lgn-f{padding:16px 36px;border-top:1px solid var(--beige);display:flex;justify-content:flex-end;gap:8px}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;font-size:12px;letter-spacing:.04em;z-index:9999;animation:nIn .18s ease;border-left:3px solid var(--accent)}
@keyframes nIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:768px){
  .hdr,.toolbar{padding:0 16px}
  .page{padding:24px 16px 60px}
  .d-hdr,.d-body,.d-ftr{padding-left:20px;padding-right:20px}
  .a-top,.a-body,.frm,.f-acts,.io{padding-left:16px;padding-right:16px}
  .f-grid{grid-template-columns:1fr}
  .mk-row{flex-direction:column}
  .mk-sep{display:none}
  .srch input{width:110px}
  .wr-grapes{display:none}
  .wr-left{flex-wrap:wrap;row-gap:2px}
}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){
  .a-price{display:none}
}

const calcSug  = (c,m)=>{const cv=parseFloat(c),mv=parseFloat(m);if(!cv||isNaN(cv)||isNaN(mv))return null;return(cv*(1+mv/100)).toFixed(2)};
const calcMarg = (c,p)=>{const cv=parseFloat(c),pv=parseFloat(p);if(!cv||!pv||pv===0)return null;return(((pv-cv)/pv)*100).toFixed(1)};
const calcMult = (c,p)=>{const cv=parseFloat(c),pv=parseFloat(p);if(!cv||!pv)return null;return(pv/cv).toFixed(2)};
// Fasce di ricarico (ODS Ivano): prezzo_finale = costo*(1+molt), ivato = pf*1.1, asporto = pf*1.22

const calcFascia=c=>{const cv=parseFloat(c);if(!cv||cv<=0)return null;const f=FASCE.find(f=>cv<=f.max)||FASCE[FASCE.length-1];const pf=parseFloat((cv*(1+f.molt)).toFixed(2));const ivato=parseFloat((pf*1.1).toFixed(2));const asp=parseFloat((pf*1.22).toFixed(2));return{label:f.label,molt:f.molt,costo:cv,prezzoBase:pf,ivato,asporto:asp};};

};
const fixMojibake = str => {
  if (!str || typeof str !== 'string') return str;
  if (!/[\xC0-\xFF]/.test(str)) return str;
  try {
    const bytes = new Uint8Array(str.length);
    for (let i = 0; i < str.length; i++) bytes[i] = str.charCodeAt(i) & 0xFF;
    const fixed = new TextDecoder('utf-8').decode(bytes);
    if (fixed.includes('\uFFFD')) return str;
    return fixed;
  } catch { return str; }
};
const fixWineEncoding = w => {
  const fields = ['name','producer','region','grapes','notes','country'];
  const out = {...w};
  fields.forEach(f => { if(out[f]) out[f] = fixMojibake(out[f]); });
  return out;
};
const toBase64 = str => new Promise(resolve=>{
  const blob = new Blob([str],{type:"text/plain;charset=utf-8"});
  const reader = new FileReader();
  reader.onload = ()=>resolve(reader.result.split(",")[1]);
  reader.readAsDataURL(blob);
});
const ghSave = async(data)=>{
  if(!ghToken())throw new Error("Token GitHub mancante — inseriscilo in Admin → Backup → Token");
  const shaR=await fetch(GH_API,{headers:ghHdrs()});
  if(shaR.ok){const d=await shaR.json();_ghSha=d.sha;}
  const json=JSON.stringify(data,null,2);
  const b64=await toBase64(json);
  const body={message:"aggiornamento carta vini",content:b64};
  if(_ghSha)body.sha=_ghSha;
  const r=await fetch(GH_API,{method:"PUT",headers:ghHdrs(),body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.message||"GH save "+r.status);}
  _ghSha=(await r.json()).content.sha;
};

function QRTavoloWidget() {
  const [url,setUrl]     = React.useState(window.location.href.split("?")[0]);
  const [tavolo,setTavolo] = React.useState("");
  const [generated,setGenerated] = React.useState(false);
  const qrRef = React.useRef(null);
  const qrObj = React.useRef(null);

  const fullUrl = tavolo ? url+"?t="+encodeURIComponent(tavolo) : url;

  const generate = () => {
    if(qrRef.current){qrRef.current.innerHTML="";}
    if(qrObj.current){try{qrObj.current.clear();}catch(e){}}
    try{
      qrObj.current = new QRCode(qrRef.current,{text:fullUrl,width:300,height:300,colorDark:"#2C2420",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
      setGenerated(true);
    }catch(e){console.error(e);}
  };

  const download = () => {
    if(!qrRef.current)return;
    const canvas=qrRef.current.querySelector("canvas");
    if(!canvas)return;
    const c2=document.createElement("canvas");
    c2.width=360;c2.height=440;
    const ctx=c2.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,360,440);
    ctx.drawImage(canvas,30,30,300,300);
    ctx.fillStyle="#2C2420";
    ctx.font="bold 14px 'Sohne',sans-serif";
    ctx.textAlign="center";
    if(tavolo){ctx.fillText("Tavolo "+tavolo,180,370);}
    ctx.font="11px 'Sohne',sans-serif";
    ctx.fillStyle="#999085";
    ctx.fillText("La Dogana — Carta dei Vini",180,395);
    const a=document.createElement("a");
    a.download="qr-tavolo"+(tavolo?"-"+tavolo:"")+".png";
    a.href=c2.toDataURL("image/png");a.click();
  };

  return(
    <div style={{marginTop:8}}>
      <div className="f-grid" style={{marginBottom:12}}>
        <div className="f-col"><label className="f-lbl">URL base</label><input className="f-inp" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://…"/></div>
        <div className="f-col"><label className="f-lbl">Numero tavolo (opzionale)</label><input className="f-inp" value={tavolo} onChange={e=>setTavolo(e.target.value)} placeholder="es. 7"/></div>
      </div>
      <div style={{marginBottom:8,fontSize:11,color:"var(--taupe)"}}>URL: <strong style={{color:"var(--dark)"}}>{fullUrl}</strong></div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button className="btn btn-p btn-sm" onClick={generate}>Genera QR</button>
        {generated&&<button className="btn btn-sm" onClick={download}>⬇ Scarica PNG</button>}
      </div>
      <div ref={qrRef} style={{display:"inline-block"}}/>
    </div>
  );
}

    try{const d=JSON.parse(text);if(!Array.isArray(d))throw 0;if(!window.confirm(`Importare ${d.length} vini? I dati attuali verranno sostituiti.`))return;persist(d);setImportErr("");toast(`✓ ${d.length} vini importati`);}
    catch{setImportErr("File non valido.");}
  };
  const handleFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>doImport(ev.target.result);r.readAsText(f);e.target.value="";};
  const XLSX_MAP={"nome":"name","nome *":"name","produttore":"producer","categoria":"category","categoria *":"category","regione":"region","annata":"vintage","uve":"grapes","note degustazione":"notes","prezzo acquisto":"costPrice","prezzo bottiglia":"price","prezzo bottiglia *":"price","prezzo calice":"priceByGlass","prezzo asporto":"priceAsporto","stock":"stock"};
  const CAT_NORM={"bianco":"Bianco","bianchi":"Bianco","rosso":"Rosso","rossi":"Rosso","rosato":"Rosato","rosati":"Rosato","rose":"Rosato","bollicine":"Bollicine","spumante":"Bollicine","champagne":"Champagne","naturale":"Bianco","naturali":"Bianco","dolce":"Dolce","dolci":"Dolce","passito":"Dolce"};
  const doImportXlsx=file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hdrRow=-1;
        for(let i=0;i<Math.min(aoa.length,10);i++){
          const row=aoa[i].map(c=>String(c).toLowerCase().trim());
          if(row.indexOf("nome")!==-1||row.indexOf("nome *")!==-1){hdrRow=i;break;}
        }
        if(hdrRow===-1)throw new Error("Intestazioni non trovate.");
        const headers=aoa[hdrRow].map(c=>String(c).toLowerCase().trim());
        const nameIdx=headers.indexOf("nome *")!==-1?headers.indexOf("nome *"):headers.indexOf("nome");
        const result=[];
        for(let i=hdrRow+1;i<aoa.length;i++){
          const row=aoa[i];
          const nameVal=nameIdx>=0?String(row[nameIdx]||"").trim():"";
          if(!nameVal||nameVal.toUpperCase().indexOf("ESEMPIO")===0)continue;
          const w={id:Date.now()+i};
          headers.forEach((h,ci)=>{
            const field=XLSX_MAP[h];if(!field)return;
            let val=row[ci];if(val==null||val===""){w[field]=null;return;}
            val=String(val).trim();
            if(["costPrice","price","priceByGlass","priceAsporto"].indexOf(field)!==-1){const n=parseFloat(val.replace(",","."));w[field]=isNaN(n)?null:n;}
            else if(field==="stock"){const n=parseInt(val);w[field]=isNaN(n)?null:n;}
            else if(field==="category"){const k=val.toLowerCase().trim();w[field]=CAT_NORM[k]||"Bianco";}
            else{w[field]=val;}
          });
          if(!w.name||!w.price)continue;
          w.visible=true;w.isNaturale=!!w.isNaturale;w.isBiologico=!!w.isBiologico;w.isBiodinamico=!!w.isBiodinamico;w.so2=!!w.so2;
          result.push(w);
        }
        if(result.length===0)throw new Error("Nessun vino trovato.");
        if(!window.confirm(`Importare ${result.length} vini? I dati attuali verranno sostituiti.`))return;
        persist(result);setImportErr("");toast(`✓ ${result.length} vini importati da Excel`);
      }catch(err){setImportErr(err.message||"Errore nel file.");}
    };
    reader.readAsArrayBuffer(file);
  };

                  <span className="f-sec">Scorte</span>
                  <div className="f-grid">
                    <div className="f-col"><label className="f-lbl">Bottiglie disponibili</label><input className="f-inp" type="number" min="0" step="1" value={form.stock} onChange={e=>sf("stock",e.target.value)} placeholder="es. 12"/><span className="f-hint">Lascia vuoto per non tracciare · <strong>visibile solo admin</strong></span></div>
                    {form.stock!==""&&(()=>{const st=stockInfo(form.stock);return st?(<div className="f-col" style={{justifyContent:"flex-end"}}><label className="f-lbl">Stato</label><span className={`stag ${st.cls}`} style={{alignSelf:"flex-start"}}>● {st.label}</span></div>):null;})()}
                  </div>
                </div>
                <div className="f-acts">
                  <button className="btn btn-g btn-sm" onClick={()=>setShowForm(false)}>Annulla</button>
                  <button className="btn btn-p btn-sm" onClick={saveForm}>{editWine?"Salva modifiche":"Aggiungi alla carta"}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {notif&&<div className="notif">{notif}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
